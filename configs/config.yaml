seed: 42

data:
  root: "data"
  target_family: RF00005   # user-set per run
  max_seq_len: 200
  train_split: 0.8

model:
  node_input_dim: 3
  hidden_dim: 128
  num_heads: 4
  num_layers: 4
  dropout: 0.3
  edge_dim: 2
  vocab_size: 4

training:
  batch_size: 32
  learning_rate: 1.0e-3
  num_epochs: 200
  weight_decay: 1.0e-3
  grad_clip: 1.0
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stopping_patience: 15

evaluation:
  min_window_length: 25
  max_window_length: 50
